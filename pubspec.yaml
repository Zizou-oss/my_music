name: music_app
description: Application musicale solo, offline.
version: 1.2.1+3

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  just_audio: ^0.9.36
  just_audio_background: ^0.0.1-beta.17
  sqflite: ^2.3.0
  path_provider: ^2.1.2
  path: ^1.9.1
  audio_service: ^0.18.18
  permission_handler: ^11.3.1
  shared_preferences: ^2.2.3
  share_plus: ^10.1.4
  url_launcher: 6.2.6
  font_awesome_flutter: ^10.8.0
  flutter_svg: ^2.0.10+1
  supabase_flutter: ^2.8.4
  connectivity_plus: ^6.1.1
  http: ^1.2.2
  uuid: ^4.5.1
  flutter_local_notifications: ^17.2.2
  package_info_plus: ^8.0.2
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.10.0
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

flutter_icons:
  android: true
  ios: true
  image_path: assets/images/logo.png
